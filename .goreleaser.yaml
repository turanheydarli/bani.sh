version: 2

project_name: banish

builds:
  - main: ./cmd/banish
    binary: banish
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

nfpms:
  - package_name: banish
    vendor: banish
    homepage: "https://banish.sh"
    maintainer: "Turan Heydarli <turanheyder91@gmail.com>"
    description: "Token-optimized middleware for LLM coding agents."
    license: MIT
    formats:
      - deb
      - rpm
      - apk

homebrew_casks:
  - name: banish
    repository:
      owner: turanheydarli
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Dormant until you create the turanheydarli/homebrew-tap repo and add a
    # HOMEBREW_TAP_TOKEN secret (a PAT with contents:write on that repo). Without
    # the token the cask is generated but not pushed, so releases stay green.
    # With a token, "auto" still skips the push for prerelease tags
    # (v1.2.3-beta.1) so the tap only ever serves stable releases; beta users
    # opt in via "banish upgrade --channel beta" or BANISH_CHANNEL=beta.
    skip_upload: '{{ if eq (envOrDefault "HOMEBREW_TAP_TOKEN" "") "" }}true{{ else }}auto{{ end }}'
    homepage: "https://banish.sh"
    description: "Token-optimized middleware for LLM coding agents."
    # Unsigned binary: clear the macOS quarantine flag on install.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/banish"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
