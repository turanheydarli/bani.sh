name: release-discord

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  announce:
    runs-on: ubuntu-latest
    # Pre-releases (v1.2.3-rc.1) belong in #dev, not #announcements -- skip them.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather release data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          prev=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)

          # GoReleaser creates the GitHub Release on the same tag push, then
          # fills in the body. Wait for a non-empty body (up to ~3 min).
          notes=""
          for _ in $(seq 1 36); do
            notes=$(gh release view "$TAG" --json body --jq .body 2>/dev/null || true)
            if [ -n "$notes" ]; then break; fi
            sleep 5
          done

          # Contributors as GitHub @handles where the commits are linked to an
          # account; fall back to git author names if the API yields nothing.
          strip='s/^[[:space:]]*[0-9]+[[:space:]]+//; s/ <.*$//'
          if [ -n "$prev" ]; then
            range="${prev}..${TAG}"; base="$prev"
          else
            range="$TAG"; base=$(git rev-list --max-parents=0 "$TAG" | tail -1)
          fi
          names=$(git shortlog -sne "$range" | sed -E "$strip" | sort -u)
          logins=$(gh api "repos/${REPO}/compare/${base}...${TAG}" --paginate \
                     --jq '.commits[].author.login // empty' 2>/dev/null | sort -u || true)
          if [ -n "$logins" ]; then
            contributors=$(printf '%s\n' "$logins" | sed 's/^/@/')
          else
            contributors="$names"
          fi

          # First-timers: contributors with no commits before this release.
          if [ -z "$prev" ]; then
            first="$contributors"
          elif [ -n "$logins" ]; then
            prior=$(gh api "repos/${REPO}/commits?sha=${prev}&per_page=100" --paginate \
                      --jq '.[].author.login // empty' 2>/dev/null | sort -u || true)
            first=$(comm -23 <(printf '%s\n' "$logins") <(printf '%s\n' "$prior") | sed 's/^/@/' || true)
          else
            prior=$(git shortlog -sne "$prev" | sed -E "$strip" | sort -u)
            first=$(comm -23 <(printf '%s\n' "$names") <(printf '%s\n' "$prior") || true)
          fi

          d="EOF_$(date +%s%N)"
          {
            echo "PREV_TAG=${prev}"
            echo "NOTES<<${d}";        printf '%s\n' "$notes";        echo "${d}"
            echo "CONTRIBUTORS<<${d}c"; printf '%s\n' "$contributors"; echo "${d}c"
            echo "FIRST_TIMERS<<${d}f"; printf '%s\n' "$first";        echo "${d}f"
          } >> "$GITHUB_ENV"

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: python3 scripts/post-release.py
